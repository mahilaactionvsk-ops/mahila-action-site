<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4efe7" />

    <!--app-head-->
    <!-- ↑ Per-page <title>, meta description, canonical, OG/Twitter tags, and
         JSON-LD are injected here by scripts/prerender.mjs for the static
         build. During `vite dev` this block is empty and <Seo> fills the
         <head> client-side instead — either way the tags end up identical. -->

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100%; }
      /* Avoids invisible-text flash while the webfont loads (better CLS/LCP). */
      @font-face {
        font-family: "Fraunces Fallback";
        src: local("Georgia");
        size-adjust: 105%;
      }
    </style>
  </head>

  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/entry-client.tsx"></script>
  </body>
</html>
